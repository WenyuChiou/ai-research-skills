version: 2
updated: "2026-04-25"
catalog_name: ai-research-skills
description: Curated AI skills for research workflows, literature management, academic writing, and multi-agent delegation.

families:
  - id: research-workspace
    name: Research workspace
    canonical_repo: https://github.com/WenyuChiou/research-hub
    default_branch: master
    install:
      summary: Install all packaged research-hub skills through the research-hub CLI; `setup` is the recommended onboarding (init + install + persona + optional NotebookLM login in one command).
      commands:
        - pip install research-hub-pipeline
        - research-hub setup --persona researcher  # or: analyst | humanities | internal
      optional_commands:
        - pip install "research-hub-pipeline[playwright]"
        - research-hub notebooklm login
        - research-hub install --platform claude-code  # bare install if you skipped setup
    tools:
      - Zotero
      - Obsidian
      - NotebookLM
    skills:
      - name: research-hub
        directory: research-hub
        repo_url: https://github.com/WenyuChiou/research-hub
        skill_url: https://github.com/WenyuChiou/research-hub/blob/master/skills/research-hub/SKILL.md
        purpose: Operate research-hub workflows for discovery, ingest, organization, NotebookLM, dashboard, and maintenance.
        use_when:
          - Find papers about a topic and organize them.
          - Ingest local files into an Obsidian vault.
          - Upload a cluster to NotebookLM and download a brief.
          - Inspect or maintain a research-hub vault.
        outputs:
          - Zotero collections and tags
          - Obsidian Markdown notes
          - NotebookLM bundles and briefs
          - research-hub dashboards
        verified_on: "2026-04-25"
        verification_status: pass
        verification_tier: T1
        verification_notes: doctor green; search returned 3 real results from CrossRef + DBLP
      - name: research-hub-multi-ai
        directory: research-hub-multi-ai
        repo_url: https://github.com/WenyuChiou/research-hub
        skill_url: https://github.com/WenyuChiou/research-hub/blob/master/skills/research-hub-multi-ai/SKILL.md
        purpose: Router that writes `.coord/multi_ai_plan.md` when a single round will need >=2 delegates (codex + gemini, multiple parallel codex sessions, or mixed handoffs). The router decides task splitting, dependency ordering, and reconciliation; codex-delegate and gemini-delegate are the leaves that execute.
        use_when:
          - One round of work will need two or more delegates (codex + gemini, or multiple parallel codex sessions).
          - Need a dependency-aware multi-AI plan with shared success criteria.
          - Reconcile outputs from two or more delegate runs against a single goal.
        outputs:
          - .coord/multi_ai_plan.md (YAML schema with plan_id, goal, success_criteria, tasks[], reconciliation)
          - Per-task brief files at the path each task declares
        verified_on: "2026-05-09"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          T1 retained. Repositioned as router in router/leaves architecture
          via upstream PR https://github.com/WenyuChiou/research-hub/pull/30:
          tightened trigger to >=2 delegate same round (no longer competes
          with codex-delegate / gemini-delegate on "batch edits" / "CJK
          prose"); added `.coord/multi_ai_plan.md` schema and template
          under references/multi_ai_plan_template.md; rewrote evals so
          single-delegate / single-LLM cases expect this skill NOT to
          fire. Earlier 9-step routing-plan output at
          test-corpus/ai-agents-social-interaction/.research/multi-ai-routing-decision.md
          remains a valid pre-router-era artifact.
      - name: research-context-compressor
        directory: research-context-compressor
        repo_url: https://github.com/WenyuChiou/research-hub
        skill_url: https://github.com/WenyuChiou/research-hub/blob/master/skills/research-context-compressor/SKILL.md
        purpose: Create .research manifests so future AI sessions avoid repeated repo scans.
        use_when:
          - Start AI work in a research repo.
          - Save project context for future agents.
          - Reduce repeated token use across sessions.
        outputs:
          - .research/project_manifest.yml
          - .research/experiment_matrix.yml
          - .research/data_dictionary.yml
        verified_on: "2026-04-25"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          T1 promoted. Output committed to
          test-corpus/ai-agents-social-interaction/.research/{project_manifest,
          experiment_matrix,data_dictionary}.yml + run_log.md +
          open_questions.md. All 3 YAML files parse cleanly. Did not
          invent research_question; left decisions.md empty (no ADRs);
          surfaced 4 real open questions including the codex caveat.
      - name: research-project-orienter
        directory: research-project-orienter
        repo_url: https://github.com/WenyuChiou/research-hub
        skill_url: https://github.com/WenyuChiou/research-hub/blob/master/skills/research-project-orienter/SKILL.md
        purpose: Read .research manifests and produce a concise orientation memo.
        use_when:
          - Ask "what is this repo about?"
          - Resume a research project after context has been compressed.
        outputs:
          - Orientation memo in conversation
        verified_on: "2026-04-25"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          T1 promoted. Output committed to
          test-corpus/ai-agents-social-interaction/.research/orientation_memo.md.
          Followed the exact memo template in SKILL.md; read 0 source
          files outside .research/ (per skill's token-saving rule).
      - name: research-design-helper
        directory: research-design-helper
        repo_url: https://github.com/WenyuChiou/research-hub
        skill_url: https://github.com/WenyuChiou/research-hub/blob/master/skills/research-design-helper/SKILL.md
        purpose: Guide a researcher through 5 Socratic segments (research question sharpening, expected mechanism, identifiability check, validation plan, risk register) and produce .research/design_brief.md. Does NOT write the model spec or invent the research question - guides the human to articulate them.
        use_when:
          - Frame a vague interest into a falsifiable research question.
          - Sharpen a hypothesis before designing a model.
          - Walk through study design before coding starts.
          - Produce a design_brief artifact that compressor / orienter can read.
        outputs:
          - .research/design_brief.md
        verified_on: "2026-04-25"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          T1 promoted. Output committed to
          test-corpus/ai-agents-social-interaction/.research/design_brief.md.
          5-segment Socratic dialog completed all sections (no _TODO_
          left): RQ sharpened with concrete falsification condition
          (Cliff's δ < 0.5, p > 0.05 in 2 non-poker tasks); 5 risks
          each with early-warning + mitigation. Skill correctly did not
          invent the RQ (built on Lin & Hou 2026's claim) and did not
          propose model architecture (Stage 4 boundary respected).
      - name: literature-triage-matrix
        directory: literature-triage-matrix
        repo_url: https://github.com/WenyuChiou/research-hub
        skill_url: https://github.com/WenyuChiou/research-hub/blob/master/skills/literature-triage-matrix/SKILL.md
        purpose: Compare papers by method, data, claims, limitations, and relevance.
        use_when:
          - Compare a Zotero collection, Obsidian cluster, or manual paper list.
          - Decide which papers are central to a literature review.
        outputs:
          - .research/literature_matrix.md
        verified_on: "2026-04-25"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          T1 promoted. Output committed to
          test-corpus/ai-agents-social-interaction/.research/literature_matrix.md.
          5 papers x 9 columns matrix from test corpus
          (test-corpus/ai-agents-social-interaction/papers/). Correctly
          separated 3 method types (empirical/tooling/conceptual) and 5
          domains - confirmed by the 3x5 sanity grid in the output.
      - name: paper-memory-builder
        directory: paper-memory-builder
        repo_url: https://github.com/WenyuChiou/research-hub
        skill_url: https://github.com/WenyuChiou/research-hub/blob/master/skills/paper-memory-builder/SKILL.md
        purpose: Extract .paper claims and figure memory for manuscript work.
        use_when:
          - Prepare a manuscript for academic-writing-skills.
          - Extract claims, supporting evidence, and figure key numbers.
        outputs:
          - .paper/claims.yml
          - .paper/figures.yml
        verified_on: "2026-04-25"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          T1 promoted. Output committed to test-corpus/ai-agents-social-interaction/.paper/lim-2025/{claims,figures}.yml.
          5 claims (C1-C5) extracted verbatim from Lim 2025 abstract;
          C5 marked status:draft (non-significant trend). figures.yml
          intentionally empty per "don't fabricate" rule, with
          run_notes documenting the abstract-only scope.
      - name: paper-summarize
        directory: paper-summarize
        repo_url: https://github.com/WenyuChiou/research-hub
        skill_url: https://github.com/WenyuChiou/research-hub/blob/master/skills/paper-summarize/SKILL.md
        purpose: Fill per-paper Key Findings / Methodology / Relevance in both Obsidian markdown and Zotero child notes after `research-hub auto` ingests a cluster.
        use_when:
          - "User says: \"summarize the papers in cluster X\" or \"fill the TODO Key Findings\"."
          - Just ran `research-hub auto` and per-paper notes are still TODO skeletons.
          - Want Zotero notes and Obsidian markdown to stay in sync per paper.
        outputs:
          - Obsidian markdown blocks (`## Key Findings`, `## Methodology`, `## Relevance` per paper)
          - Zotero child note HTML (one per paper, atomically rolled back if write fails)
          - Fallback prompt at `<vault>/.research_hub/artifacts/<slug>/summarize-prompt.md` when no LLM CLI on PATH
        verified_on: "2026-05-09"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          T1 promoted. The skill ships with 23 end-to-end tests across
          three files (`tests/test_v069_summarize.py` 17 cases,
          `tests/test_v073_parallel_summarize.py` 3 cases,
          `tests/test_v080_resummarize.py` 3 cases) that stub the LLM CLI
          but execute real Obsidian markdown writes against fixture vaults
          and the Zotero rollback invariant. Upstream PR
          https://github.com/WenyuChiou/research-hub/pull/31 surfaces this
          coverage in the skill's own ## Verification section so the T1
          claim is visible to consumers. Real-vault smoke runs remain a
          manual fallback rather than a primary verification path.
      - name: notebooklm-brief-verifier
        directory: notebooklm-brief-verifier
        repo_url: https://github.com/WenyuChiou/research-hub
        skill_url: https://github.com/WenyuChiou/research-hub/blob/master/skills/notebooklm-brief-verifier/SKILL.md
        purpose: Verify NotebookLM briefs against uploaded source bundles.
        use_when:
          - Check whether a NotebookLM brief missed sources.
          - Identify unsupported claims or contradictions in a generated brief.
        outputs:
          - Verification report in conversation
          - Follow-up NotebookLM prompts
        verified_on: "2026-04-25"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          T1 verified in BOTH modes (research-hub-managed + Manual fallback).
          Mode 1 (research-hub-managed, 2026-04-25): full cycle - cluster
          create, 5-paper ingest, bundle, upload to live NLM, generate,
          download, verify. Output: test-corpus/ai-agents-social-interaction/.research_hub/brief-verify-20260426T001559Z.md.
          Caught real failure: NLM produced Kumar-only brief (1/5 sources)
          despite "Multi-Agent and Embodied AI" title. Direct `notebooklm
          ask` proved all 5 sources ARE indexed; failure is in NLM's
          brief-generation step.
          Mode 2 (Manual fallback, v0.68.2, 2026-04-26): fresh-user setup -
          brief.txt + sources.md (markdown bullet list) at arbitrary
          paths, NO research-hub paths read. Output:
          test-corpus/manual-fallback-fresh-user/brief-verify-manual-fallback.md.
          Produces IDENTICAL verification output to Mode 1: same 1/5
          source coverage detected, same 4 missed sources, same 1
          unsupported claim, same 5 follow-up prompts. Confirms a fresh
          user who uploads to NotebookLM directly (no research-hub
          workspace) gets the same verification quality.
      - name: gap-to-topic
        directory: gap-to-topic
        repo_url: https://github.com/WenyuChiou/research-hub
        skill_url: https://github.com/WenyuChiou/research-hub/blob/master/skills/gap-to-topic/SKILL.md
        purpose: Turn a research area into a go/no-go decision dossier for one candidate thesis or proposal topic - a 3-gate verdict (gap open? a contribution? feasible?) with the evidence laid out so the researcher can verify it. Stops short of the verdict, handing the worth-it call back to the researcher and advisor.
        use_when:
          - Decide whether a research gap is worth pursuing.
          - Pick a thesis or proposal topic.
          - Check whether a research idea is already taken.
          - Vet a research idea before committing to it.
        outputs:
          - .research/topic_dossier.md (the 5-section decision dossier)
          - A .bib companion (the Gate 1 reference list)
          - A .gaps.yml companion (structured gaps + open questions)
        verified_on: "2026-05-21"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          Dogfood-verified end-to-end 2026-05-21: a run on the topic
          "LLM-generated agent profiles in agent-based models" produced a
          complete five-section topic_dossier.md plus .bib and .gaps.yml
          companions matching the dossier template. The run surfaced one
          Gate 1 bug - the .bib instruction relied on `cite`, which
          resolves only already-ingested Zotero items - fixed upstream in
          research-hub plugin v0.3.1 (PR #75). SKILL.md and references
          were also reviewed by the code-reviewer subagent across two
          rounds when the skill was added. A follow-up workflow audit found
          §1 named literature-triage-matrix as the default prior-art tool
          without a step producing its matrix; fixed in plugin v0.3.2
          (PR #76), and the skill was re-tested end-to-end on the topic
          "LLM applications in water resources" on the corrected pipeline.
          The dossier output was then iterated for readability through
          plugin v0.3.5: reader-first layout (PR #78), scannability tables
          incl. a Decision scorecard (PR #80), and evidence-strength tags
          plus an upgrade/kill test from a Codex evaluation (PR #82).
          Plugin v0.3.6 (PR #86) wired §1 onto the new `search --screen`
          fit-check BM25 relevance gate, and the skill was re-tested
          end-to-end on the screened pipeline. Plugin v0.3.7 (PR #87)
          reworked the dossier to read as a plain summary report — no
          machine codes, no glyphs, plain verdicts, an in-document index.
          Plugin v0.3.8 (PR #89) reworked the dossier section-by-section for
          researcher value — a Likert scorecard, a "what it would
          contribute" claim and a validation sketch in Gate 2, design /
          scale / proposal-vs-dissertation feasibility in Gate 3, and a
          method-note Appendix.
      - name: zotero-library-curator
        directory: zotero-library-curator
        repo_url: https://github.com/WenyuChiou/research-hub
        skill_url: https://github.com/WenyuChiou/research-hub/blob/master/skills/zotero-library-curator/SKILL.md
        purpose: Audit and curate a Zotero library - find duplicate DOIs, orphan items missing required tags, propose collection rebinds, generate tag hygiene reports, emit preview-only cleanup plans. Defers all CRUD to the standalone zotero-skills skill or research-hub zotero CLI.
        use_when:
          - Audit a Zotero library before a literature review.
          - Find duplicate DOIs or orphan items.
          - Generate a tag hygiene report.
          - Propose a Zotero cleanup plan (preview only, no writes).
        outputs:
          - Audit report in conversation
          - Preview-only cleanup plan (handed to zotero-skills for apply)
        verified_on: "2026-04-25"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          T1 promoted. Output committed to
          test-corpus/ai-agents-social-interaction/.research_hub/zotero-curator-audit-20260425.md.
          Read-only audit of real vault (我的文獻庫 + 1102 obsidian
          notes): caught 10 duplicate DOIs (3 shown verbatim with
          keep/merge advice), 44 case-only near-duplicate tag pairs
          (e.g. ABM-Methodology vs ABM-methodology), 435 sparse tags
          (89% of 488), 2 cluster-bloat candidates (>200 items), 1
          orphan cluster (ai-agents-social-interaction-test residual).
          Zero writes performed; all findings emitted as preview plans
          with explicit handoff to zotero-skills / research-hub
          clusters for any apply step.

  - id: academic-writing
    name: Academic writing
    canonical_repo: https://github.com/WenyuChiou/academic-writing-skills
    default_branch: main
    install:
      summary: Clone the standalone skill into your AI assistant skills directory.
      commands:
        - git clone https://github.com/WenyuChiou/academic-writing-skills ~/.claude/skills/academic-writing-skills
    tools:
      - Word
      - LaTeX
      - Markdown
      - Obsidian
    skills:
      - name: academic-writing-skills
        directory: .
        repo_url: https://github.com/WenyuChiou/academic-writing-skills
        skill_url: https://github.com/WenyuChiou/academic-writing-skills/blob/main/skills/academic-writing-skills/SKILL.md
        purpose: Manuscript revision, claim-evidence audit, reviewer response, figure-text consistency, and submission checks.
        use_when:
          - Rewrite or audit manuscript sections.
          - Build reviewer response tables.
          - Check claims against evidence and figures.
          - Prepare journal submission or resubmission materials.
        outputs:
          - Revised manuscript prose
          - Claim-evidence audit
          - Reviewer response table
          - Submission checklist
        verified_on: "2026-04-25"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          T1 promoted. Output committed to test-corpus/ai-agents-social-interaction/.paper/lim-2025/audit-lim-2025-abstract.md.
          Banned-word audit on Lim 2025 abstract found 3 banned
          (leveraging, crucial, highlight) + 1 borderline filler
          ("address this gap"). Correctly did NOT flag "tended to"
          (recommended replacement, not banned), proving the audit
          reads the rules rather than naive keyword-matching.

