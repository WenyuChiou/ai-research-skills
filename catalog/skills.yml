          - Updated collections and tags
        verified_on: "2026-04-25"
        verification_status: pass
        verification_tier: T1
        verification_notes: Zotero local API returned real collection (key GH5CN2ZZ from library 我的文獻庫); add_literature.py and zotero_client.py present.

  - id: ai-delegation
    name: AI delegation
    canonical_repo: https://github.com/WenyuChiou/codex-delegate
    default_branch: master
    install:
      summary: Install one or both delegation skills depending on the external AI CLI you use.
      commands:
        - git clone https://github.com/WenyuChiou/codex-delegate ~/.claude/skills/codex-delegate
        - git clone https://github.com/WenyuChiou/gemini-delegate-skill ~/.claude/skills/gemini-delegate-skill
    tools:
      - Claude
      - Codex
      - Gemini
    skills:
      - name: codex-delegate
        directory: .
        repo_url: https://github.com/WenyuChiou/codex-delegate
        skill_url: https://github.com/WenyuChiou/codex-delegate/blob/master/skills/codex-delegate/SKILL.md
        purpose: Leaf delegate for token-heavy mechanical coding work — batch edits, test scaffolding, refactors with clear patterns. Claude supervises; Codex CLI executes.
        use_when:
          - Batch-edit many files with a clear pattern.
          - Generate test scaffolding from an implementation.
          - Apply a deterministic refactor across a codebase.
          - Single delegate this round (one Codex session). For two or more delegates same round, route via research-hub-multi-ai instead.
        outputs:
          - Codex task brief at .ai/codex_task_<name>.md
          - Wrapper result.json contract (status / files_changed / summary / risks)
          - Supervisor review checklist
        verified_on: "2026-05-09"
        verification_status: pass
        verification_tier: T1
        verification_notes: |
          T1 promoted. The earlier T2 caveat (codex-cli 0.121.0 default
          model gpt-5.5 aborting) is now resolved at the skill itself via
          upstream PR https://github.com/WenyuChiou/codex-delegate/pull/1:
          new ## Model Selection section documents the -m gpt-5.4
          workaround and ~/.codex/config.toml override; new ## Non-
          Interactive Shell Note documents the < /dev/null requirement;
          new ## Quota Fallback formalizes the .fallback_claude sentinel
          mechanism; new ## Multi-Agent Coordination clarifies the leaf
          role; new ## Five Workflow Patterns + references/patterns.md
          document context file / parallel / resume / structured output /
          review mode. The shipped wrappers already default to gpt-5.4.
      - name: gemini-delegate
        directory: .
        repo_url: https://github.com/WenyuChiou/gemini-delegate-skill
        skill_url: https://github.com/WenyuChiou/gemini-delegate-skill/blob/master/skills/gemini-delegate/SKILL.md
        purpose: Leaf delegate for long-context reading, CJK / bilingual writing, and second-opinion review. Claude supervises; Gemini CLI executes.
        use_when:
          - Long-context reading or synthesis where context length is the bottleneck.
          - Traditional Chinese, Japanese, Korean, or other CJK long-form output.
          - Bilingual rewrites where terminology consistency across languages matters.
          - Second-opinion review on a draft or design document.
          - Single delegate this round (one Gemini session). For two or more delegates same round, route via research-hub-multi-ai instead.
        outputs:
          - Gemini task brief
          - Long-form synthesis or review output
        verified_on: "2026-04-25"
        verification_status: pass
        verification_tier: T2
        verification_notes: gemini 0.38.2 present; one-shot prompt returned PING cleanly. Trigger language tightened to disambiguate from research-hub-multi-ai router (single-delegate vs >=2-delegate boundary).

boundaries:
  research-hub: Zotero, Obsidian, NotebookLM, local research workspace, .research, .paper handoff files.
  academic-writing-skills: Manuscript writing, reviewer response, journal compliance, claim-evidence audits.
  zotero-skills: Deep Zotero library operations that are not tied to the research-hub pipeline.
  delegation-skills: Multi-AI handoff patterns, not research-domain logic.
  model-repos: Domain-specific simulations, governance, audit traces, and external model coupling contracts.
