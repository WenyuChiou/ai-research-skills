name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install pytest pyyaml jsonschema
      - name: Run catalog tests
        run: python -m pytest tests/ -q
      - name: Check catalog <-> marketplace consistency
        run: python scripts/check_marketplace_consistency.py
      - name: Check catalog YAML against schema
        run: python scripts/check_catalog_schema.py
